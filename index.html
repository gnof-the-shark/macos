<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Congélo Stock - Liquid Glass</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root {
            --primary: #34C759;
            --accent: #007AFF;
            --danger: #FF3B30;
            /* Liquid Glass Palette */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            margin: 0;
            padding-bottom: 100px;
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Arrière-plan Liquide Animé */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 300px; height: 300px;
            background: rgba(52, 199, 89, 0.3);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .blob-2 {
            top: 40%; left: 60%;
            background: rgba(0, 122, 255, 0.2);
            width: 400px; height: 400px;
            animation-duration: 25s;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 30%); }
        }

        header {
            padding: 30px 20px 15px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 0.5px solid var(--glass-border);
            text-align: left;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }

        .page { display: none; padding: 15px; animation: iosSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .active { display: block; }
        
        @keyframes iosSlide { 
            from { opacity: 0; transform: scale(0.95) translateY(15px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }

        /* Search Bar Glass */
        .search-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .search-container input {
            background: none; border: none; margin-left: 10px; width: 100%; 
            outline: none; font-size: 17px; color: var(--text-main);
        }

        /* Card Liquid Glass */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 14px; margin-bottom: 14px;
            display: flex; align-items: center;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .card:active { transform: scale(0.96); background: rgba(255,255,255,0.5); }

        .item-img { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; background: #eee; }
        .item-info { flex: 1; margin: 0 12px; }
        .item-info strong { display: block; font-size: 16px; font-weight: 600; margin-bottom: 2px; }
        .item-info span { font-size: 12px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Qty Control Glass */
        .qty-ctrl { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(0, 0, 0, 0.04); padding: 5px; border-radius: 40px; 
        }
        .btn-circle {
            width: 32px; height: 32px; border-radius: 50%; border: none;
            background: white; color: var(--text-main); font-size: 20px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .qty-display {
            min-width: 28px; text-align: center; font-size: 16px; font-weight: 600;
        }

        /* Navigation Glass */
        nav {
            position: fixed; bottom: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            display: flex; border-top: 0.5px solid var(--glass-border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        nav button {
            flex: 1; padding: 12px 0; border: none; background: none;
            font-size: 10px; color: #8e8e93; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        nav button.active { color: var(--accent); }
        nav button i { font-style: normal; font-size: 22px; }

        /* Buttons & Forms */
        .btn {
            background: var(--accent); color: white; border: none; padding: 18px;
            border-radius: 16px; width: 100%; font-size: 17px; font-weight: 600; 
            margin-top: 10px; cursor: pointer;
        }
        
        #video-container { 
            width: 100%; border-radius: 24px; overflow: hidden; 
            background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        video { width: 100%; display: block; }

        .loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        select, input[type="number"] {
            width: 100%; padding: 16px; border-radius: 14px; 
            border: 1px solid var(--glass-border); font-size: 17px; background: rgba(255,255,255,0.5);
            -webkit-appearance: none;
        }

        .location-tag {
            background: white; padding: 8px 12px; border-radius: 10px; font-size: 14px;
            display: flex; align-items: center; gap: 8px; margin: 4px; border: 0.5px solid #eee;
        }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <header>
        <h1 id="page-title">Mes Stocks</h1>
    </header>

    <div id="error-box" style="display:none; background:rgba(255, 59, 48, 0.1); color:var(--danger); padding:15px; margin:15px; border-radius:12px; text-align:center; backdrop-filter:blur(10px);"></div>

    <!-- INVENTAIRE -->
    <div id="page-list" class="page active">
        <div class="search-container">
            <span>🔍</span>
            <input type="text" id="search" placeholder="Rechercher..." oninput="renderInventory()">
        </div>
        <div id="inventory-container">Chargement...</div>
    </div>

    <!-- AJOUTER -->
    <div id="page-add" class="page">
        <div id="scan-ui">
            <div id="video-container"><video id="video"></video></div>
            <button class="btn" id="start-scan-btn" onclick="startScan()">📷 Scanner un code</button>
            <button class="btn" style="background:var(--glass-bg); color:var(--text-main); border: 1px solid var(--glass-border);" onclick="manualAdd()">✏️ Saisie manuelle</button>
            <button class="btn" style="background:transparent; color:var(--accent);" onclick="toggleLocationManager()">⚙️ Gérer les tiroirs</button>
        </div>

        <div id="location-manager" style="display:none; background:rgba(255,255,255,0.6); padding:20px; border-radius:24px; border:1px solid var(--glass-border); backdrop-filter:blur(20px);">
            <h3 style="margin-top:0">Tiroirs & Zones</h3>
            <div id="locations-list" style="display:flex; flex-wrap:wrap; margin-bottom:20px;"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-location-input" placeholder="Nouveau..." style="flex:1; padding:12px; border-radius:12px; border:1px solid var(--glass-border);">
                <button onclick="addLocation()" style="background:var(--primary); color:white; border:none; padding:0 20px; border-radius:12px; font-weight:bold;">+</button>
            </div>
            <button class="btn" style="background:rgba(0,0,0,0.05); color:var(--text-main); margin-top:20px" onclick="toggleLocationManager()">Retour</button>
        </div>
        
        <div id="preview-ui" style="display:none; text-align:center;">
            <div id="prod-info" style="margin-bottom:25px;"></div>
            <div style="background:rgba(255,255,255,0.4); padding:20px; border-radius:22px; border:1px solid var(--glass-border);">
                <div style="text-align:left; margin-bottom:15px;">
                    <label style="font-weight:600; font-size:14px; color:var(--text-sub);">QUANTITÉ</label>
                    <input type="number" id="prod-qty" value="1" min="1">
                </div>
                <div style="text-align:left; margin-bottom:20px;">
                    <label style="font-weight:600; font-size:14px; color:var(--text-sub);">EMPLACEMENT</label>
                    <select id="prod-cat"></select>
                </div>
                <button class="btn" id="confirm-btn" onclick="confirmAdd()">💾 Enregistrer</button>
                <button class="btn" style="background:transparent; color:var(--text-sub);" onclick="cancelAdd()">Annuler</button>
            </div>
        </div>
    </div>

    <nav>
        <button onclick="switchPage('list')" id="nav-list" class="active"><i>📦</i>Stock</button>
        <button onclick="switchPage('add')" id="nav-add"><i>➕</i>Ajouter</button>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqnnnL8MvfdvzO2w-5Pnrzl8vtXdhM6TZumOPFib6MyViXwUNICFVPD0AJsFtx/exec";
        
        let inventory = [];
        let locations = ["Tiroir 1", "Tiroir 2", "Porte"];
        let tempProd = null;
        let isScanning = false;
        let longPressTimer;
        const reader = new ZXing.BrowserMultiFormatReader();

        function loadLocations() {
            const saved = localStorage.getItem('freezer_locations');
            if(saved) locations = JSON.parse(saved);
            updateLocationUI();
        }

        function updateLocationUI() {
            const list = document.getElementById('locations-list');
            if (list) list.innerHTML = locations.map((loc, index) => `
                <div class="location-tag">
                    ${loc} <button onclick="removeLocation(${index})" style="border:none;background:none;color:var(--danger);font-weight:bold;">✕</button>
                </div>`).join('');
            const select = document.getElementById('prod-cat');
            if (select) select.innerHTML = locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');
        }

        function toggleLocationManager() {
            const div = document.getElementById('location-manager');
            const scanUI = document.getElementById('scan-ui');
            const isHidden = div.style.display === 'none';
            div.style.display = isHidden ? 'block' : 'none';
            scanUI.style.display = isHidden ? 'none' : 'block';
            if (isScanning) stopScan();
        }

        function addLocation() {
            const input = document.getElementById('new-location-input');
            const val = input.value.trim();
            if(val && !locations.includes(val)) {
                locations.push(val);
                localStorage.setItem('freezer_locations', JSON.stringify(locations));
                input.value = "";
                updateLocationUI();
            }
        }

        function removeLocation(index) {
            locations.splice(index, 1);
            localStorage.setItem('freezer_locations', JSON.stringify(locations));
            updateLocationUI();
        }

        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
        
        function showError(msg) {
            const box = document.getElementById('error-box');
            box.innerText = msg; box.style.display = msg ? 'block' : 'none';
            if(msg) setTimeout(() => { box.style.display = 'none'; }, 4000);
        }

        async function callServer(payload) {
            showLoader(true);
            try {
                payload.source = "app";
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                await new Promise(r => setTimeout(r, 2000));
                showLoader(false);
                return true;
            } catch (e) {
                showLoader(false);
                showError("Erreur serveur.");
                return false;
            }
        }

        async function getData(target) {
            showLoader(true);
            try {
                const response = await fetch(`${SCRIPT_URL}?target=${target}&source=app`);
                const data = await response.json();
                showLoader(false);
                return data;
            } catch (e) {
                showLoader(false);
                return null;
            }
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('nav-' + p).classList.add('active');
            stopScan();
            if(p === 'list') loadInventory();
            if(p === 'add') cancelAdd();
        }

        async function loadInventory() {
            const data = await getData("inventory");
            if (data) { inventory = data; renderInventory(); }
        }

        function renderInventory() {
            const q = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('inventory-container');
            const items = inventory.filter(i => (i.nom && i.nom.toLowerCase().includes(q)) || (i.categorie && i.categorie.toLowerCase().includes(q)));
            
            if(items.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:40px; color:var(--text-sub);'><p>Vide</p></div>";
                return;
            }

            container.innerHTML = items.map(i => `
                <div class="card">
                    <img src="${i.image}" class="item-img" onerror="this.src='https://placehold.co/100x100?text=?'">
                    <div class="item-info">
                        <strong>${i.nom}</strong>
                        <span>${i.categorie}</span>
                    </div>
                    <div class="qty-ctrl">
                        <button class="btn-circle" onclick="updateStock('${i.barcode}', ${parseInt(i.quantite) - 1})">−</button>
                        <div class="qty-display" 
                             onmousedown="startLongPress('${i.barcode}', ${i.quantite})" 
                             onmouseup="cancelLongPress()" 
                             onmouseleave="cancelLongPress()"
                             ontouchstart="startLongPress('${i.barcode}', ${i.quantite})"
                             ontouchend="cancelLongPress()">
                             ${i.quantite}
                        </div>
                        <button class="btn-circle" onclick="updateStock('${i.barcode}', ${parseInt(i.quantite) + 1})">+</button>
                    </div>
                </div>`).join('');
        }

        function startLongPress(barcode, currentQty) {
            longPressTimer = setTimeout(() => {
                const newQty = prompt(`Nouvelle quantité (Actuel: ${currentQty}) :`, currentQty);
                if (newQty !== null) {
                    const parsed = parseInt(newQty);
                    if (!isNaN(parsed) && parsed >= 0) updateStock(barcode, parsed);
                }
            }, 700);
        }

        function cancelLongPress() { clearTimeout(longPressTimer); }

        async function updateStock(bc, nq) {
            const action = nq < 1 ? "delete" : "update";
            const success = await callServer({ action, barcode: bc, quantity: nq, target: "inventory" });
            if (success) loadInventory();
        }

        function stopScan() { reader.reset(); isScanning = false; document.getElementById('start-scan-btn').style.display = 'block'; }

        async function startScan() {
            isScanning = true;
            document.getElementById('start-scan-btn').style.display = 'none';
            try {
                const videoDevices = await reader.listVideoInputDevices();
                const selectedDeviceId = videoDevices.length > 1 ? videoDevices[videoDevices.length - 1].deviceId : undefined;
                await reader.decodeFromVideoDevice(selectedDeviceId, 'video', async (res) => {
                    if (res && isScanning) {
                        stopScan();
                        showLoader(true);
                        const r = await fetch(`https://world.openfoodfacts.org/api/v2/product/${res.text}.json`);
                        const d = await r.json();
                        showLoader(false);
                        if(d.status === 1) {
                            tempProd = { name: d.product.product_name || "Sans nom", brand: d.product.brands || "-", image: d.product.image_front_small_url || "", barcode: d.product.code };
                            showPreview();
                        } else {
                            showError("Produit non reconnu."); cancelAdd();
                        }
                    }
                });
            } catch (err) { stopScan(); }
        }

        function manualAdd() {
            const n = prompt("Nom du produit :");
            if(!n) return;
            tempProd = { name: n, brand: "Saisie manuelle", image: "", barcode: "M-" + Date.now() };
            updateLocationUI();
            showPreview();
        }

        function showPreview() {
            document.getElementById('scan-ui').style.display = 'none';
            document.getElementById('preview-ui').style.display = 'block';
            document.getElementById('prod-qty').value = 1;
            document.getElementById('prod-info').innerHTML = `
                <img src="${tempProd.image}" style="width:100px; height:100px; border-radius:20px; object-fit:cover; margin-bottom:15px;" onerror="this.src='https://placehold.co/150x150?text=Produit'">
                <h2 style="margin:0; font-size:22px;">${tempProd.name}</h2>
            `;
        }

        function cancelAdd() { stopScan(); document.getElementById('preview-ui').style.display = 'none'; document.getElementById('scan-ui').style.display = 'block'; tempProd = null; }

        async function confirmAdd() {
            if (!tempProd) return;
            const cat = document.getElementById('prod-cat').value;
            const qty = parseInt(document.getElementById('prod-qty').value) || 1;
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            const success = await callServer({ action: "add", target: "inventory", barcode: tempProd.barcode, name: tempProd.name, brand: tempProd.brand, image: tempProd.image, quantity: qty, category: cat });
            if (success) switchPage('list'); else btn.disabled = false;
        }

        window.onload = () => { loadLocations(); loadInventory(); };
    </script>
</body>
</html>
