<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center h-screen">
    <h1 class="text-2xl font-bold mb-4">YouTube Monitor</h1>
    <div id="status" class="w-12 h-12 rounded-full bg-red-500 mb-6"></div>
    <button id="startBtn" class="bg-blue-600 px-6 py-2 rounded-lg font-semibold">Démarrer la surveillance</button>

    <script>
        const statusCircle = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        let monitoring = false;

        startBtn.onclick = () => {
            monitoring = !monitoring;
            startBtn.innerText = monitoring ? "Arrêter" : "Démarrer";
            statusCircle.className = `w-12 h-12 rounded-full ${monitoring ? 'bg-green-500' : 'bg-red-500'} mb-6`;
            if(monitoring) checkAlert();
        };

        async function checkAlert() {
            if(!monitoring) return;
            try {
                // Remplace par l'IP de ton PC
                const res = await fetch('http://172.30.160.1:5000/check-alert');
                const data = await res.json();
                if(data.alert) {
                    alert("⚠️ VITE ! NOUVEAU COMMENTAIRE !");
                }
            } catch (e) { console.error("Erreur serveur", e); }
            setTimeout(checkAlert, 1000); // Vérifie toutes les 10 sec
        }
    </script>
</body>
</html>
