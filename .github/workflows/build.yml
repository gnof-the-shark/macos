name: Build Garmin Photo IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project GarminPhoto.xcodeproj \
            -scheme App

      - name: Build IPA
        run: |
          xcodebuild archive \
            -project GarminPhoto.xcodeproj \
            -scheme App \
            -configuration Debug \
            -archivePath GarminPhoto.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package
        run: |
          mkdir -p Payload
          cp -r GarminPhoto.xcarchive/Products/Applications/App.app Payload/
          zip -r GarminPhoto.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Garmin-Photo-IPA
          path: GarminPhoto.ipa

