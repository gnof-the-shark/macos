name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create Package File
        run: |
          # Si tu n'as pas de package.json, on le crée pour éviter l'erreur de Capacitor
          echo '{"name": "sport-tracker", "version": "1.0.0", "dependencies": {"@capacitor/core": "^5.0.0", "@capacitor/ios": "^5.0.0"}, "devDependencies": {"@capacitor/cli": "^5.0.0"}}' > package.json

      - name: Install Dependencies
        run: |
          npm install

      - name: Build Web Folder
        run: |
          # On crée un dossier propre pour les fichiers web (placeholder pour Capacitor)
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp styles.css www/ 2>/dev/null || true
          cp app.js www/ 2>/dev/null || true
          cp admin.js www/ 2>/dev/null || true
          
          # Si index.html n'est pas là, on regarde s'il est dans un sous-dossier par erreur
          if [ ! -f "www/index.html" ]; then
            find . -name "index.html" -not -path "./.git/*" -exec cp {} www/ \;
            find . -name "styles.css" -not -path "./.git/*" -exec cp {} www/ \;
            find . -name "app.js" -not -path "./.git/*" -exec cp {} www/ \;
            find . -name "admin.js" -not -path "./.git/*" -exec cp {} www/ \;
          fi
          
          # Page d'accueil minimale si aucun fichier web n'existe
          if [ ! -f "www/index.html" ]; then
            echo '<html><body><p>Sport Tracker</p></body></html>' > www/index.html
          fi

      - name: Capacitor Setup
        run: |
          # On supprime tout ancien dossier ios pour éviter les erreurs de liens Windows/Mac
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Copy ContentView.swift into iOS project
        run: |
          cp ContentView.swift ios/App/App/

      - name: Add camera permission to Info.plist
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :NSCameraUsageDescription string 'Nécessaire pour prendre des photos déclenchées par la montre Garmin'" \
            ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSCameraUsageDescription 'Nécessaire pour prendre des photos déclenchées par la montre Garmin'" \
            ios/App/App/Info.plist

      - name: Add ConnectIQ via Swift Package Manager
        run: |
          gem install xcodeproj --no-document 2>/dev/null || true
          ruby << 'RUBYEOF'
          require 'xcodeproj'

          project_path = 'ios/App/App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          # Add ConnectIQ remote package reference
          package = project.new(Xcodeproj::Project::Object::XCRemoteSwiftPackageReference)
          package.repositoryURL = 'https://github.com/garmin/connectiq-apple-sdk'
          package.requirement = { 'kind' => 'upToNextMajorVersion', 'minimumVersion' => '1.0.0' }
          project.root_object.package_references << package

          # Add ConnectIQ to App target
          target = project.targets.find { |t| t.name == 'App' }
          if target
            product = project.new(Xcodeproj::Project::Object::XCSwiftPackageProductDependency)
            product.package = package
            product.product_name = 'ConnectIQ'
            target.package_product_dependencies << product

            build_file = project.new(Xcodeproj::Project::Object::PBXBuildFile)
            build_file.product_ref = product
            target.frameworks_build_phase.files << build_file
          end

          project.save
          puts "ConnectIQ SPM dependency added successfully"
          RUBYEOF

      - name: Setup AppDelegate with ConnectIQ
        run: |
          cat > ios/App/App/AppDelegate.swift << 'SWIFT'
          import UIKit
          import Capacitor
          import ConnectIQ

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

            var window: UIWindow?

            func application(_ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions:
                [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
              ConnectIQ.sharedInstance().initialize(withUrlScheme: "sporttracker", uiOverrideDelegate: nil)
              return true
            }

            func application(_ app: UIApplication, open url: URL,
              options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
              if ConnectIQ.sharedInstance().handleOpenURL(url, fromSourceApplication: options[.sourceApplication] as? String) {
                return true
              }
              return ApplicationDelegateProxy.shared.application(app, open: url, options: options)
            }

            func application(_ application: UIApplication, continue userActivity: NSUserActivity,
              restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
              return ApplicationDelegateProxy.shared.application(
                application, continue: userActivity, restorationHandler: restorationHandler)
            }
          }
          SWIFT

      - name: Resolve Package Dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -workspace App.xcworkspace \
            -scheme App

      - name: Build IPA
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
