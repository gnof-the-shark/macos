name: "Build RemoteCam Final"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npx cap add ios

      - name: Preparation des Ressources
        run: |
          mkdir -p resources www
          if [ -f icon.png ]; then cp icon.png resources/icon.png; fi
          cp index.html www/index.html 2>/dev/null || echo "<html><body style='background:transparent;'></body></html>" > www/index.html
          npx @capacitor/assets generate --ios

      - name: Sync Capacitor
        run: |
          npx cap copy ios
          npx cap sync ios

      - name: Injection du Code et Correction Xcode
        run: |
          # 1. On copie tes fichiers
          cp CameraManager.swift ios/App/App/
          
          # 2. Création du AppDelegate corrigé (avec import AVFoundation explicite)
          cat <<EOF > ios/App/App/AppDelegate.swift
          import UIKit
          import Capacitor
          import AVFoundation

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              lazy var cameraManager = CameraManager()
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  cameraManager.setup()
                  let previewLayer = AVCaptureVideoPreviewLayer(session: cameraManager.session)
                  previewLayer.videoGravity = AVLayerVideoGravity.resizeAspectFill
                  
                  DispatchQueue.main.async {
                      if let rootVC = self.window?.rootViewController {
                          previewLayer.frame = rootVC.view.bounds
                          rootVC.view.layer.insertSublayer(previewLayer, at: 0)
                          rootVC.view.backgroundColor = .clear
                          
                          for subview in rootVC.view.subviews {
                              subview.backgroundColor = .clear
                              if let webView = subview as? UIView {
                                  webView.isOpaque = false
                                  webView.backgroundColor = .clear
                              }
                          }
                      }
                  }
                  return true
              }
          }
          EOF

      - name: Install Pods
        run: |
          cd ios/App
          pod install

      - name: Compilation (IPA non signé)
        run: |
          cd ios/App
          # On force Xcode à compiler TOUS les fichiers Swift du dossier
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            OTHER_SWIFT_FLAGS="\$(inherited) -DCOCOAPODS"

      - name: Preparation du fichier IPA
        run: |
          mkdir -p Payload
          APP_PATH=\$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          cp -r "\$APP_PATH" Payload/
          zip -r RemoteCam_Final.ipa Payload

      - name: Envoi du fichier
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-Final-IPA
          path: RemoteCam_Final.ipa
