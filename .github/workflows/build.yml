name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Create Package File
        run: |
          # Si tu n'as pas de package.json, on le crée pour éviter l'erreur de Capacitor
          echo '{"name": "sport-tracker", "version": "1.0.0", "dependencies": {"@capacitor/core": "^5.0.0", "@capacitor/ios": "^5.0.0"}, "devDependencies": {"@capacitor/cli": "^5.0.0"}}' > package.json

      - name: Install Dependencies
        run: |
          npm install

      - name: Build Web Folder
        run: |
          # On crée un dossier propre pour les fichiers web
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp styles.css www/ 2>/dev/null || true
          cp app.js www/ 2>/dev/null || true
          cp admin.js www/ 2>/dev/null || true
          cp firebase-config.js www/ 2>/dev/null || true
          
          # Si index.html n'est pas là, on regarde s'il est dans un sous-dossier par erreur
          if [ ! -f "www/index.html" ]; then
            find . -name "index.html" -exec cp {} www/ \;
            find . -name "styles.css" -exec cp {} www/ \;
            find . -name "app.js" -exec cp {} www/ \;
            find . -name "admin.js" -exec cp {} www/ \;
            find . -name "firebase-config.js" -exec cp {} www/ \;
          fi

      - name: Capacitor Setup
        run: |
          # On supprime tout ancien dossier ios pour éviter les erreurs de liens Windows/Mac
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Build IPA
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
