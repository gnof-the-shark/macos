name: "Build Capacitor iOS with Icon"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npx cap add ios

      - name: Generate Icons
        run: |
          # S'assure que le dossier resources existe avec ton icône
          if [ -f resources/icon.png ]; then
            npx capacitor-assets generate --ios
          else
            echo "Attention: resources/icon.png manquant, icône par défaut utilisée."
          fi

      - name: Build Web & Sync
        run: |
          mkdir -p www
          # On s'assure que l'index.html est là (évite l'écran blanc)
          if [ ! -f www/index.html ]; then
            echo "<!DOCTYPE html><html><body style='background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;'><h1>RemoteCam Active</h1></body></html>" > www/index.html
          fi
          npx cap copy ios
          npx cap sync ios

      - name: Install Pods
        run: |
          cd ios/App
          pod install

      - name: Compile iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam_Final.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-Final-IPA
          path: RemoteCam_Final.ipa
