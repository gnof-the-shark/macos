name: Build Garmin Photo IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Add iOS platform via Capacitor
        run: npx cap add ios

      - name: Build IPA
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -archivePath GarminPhoto.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package
        run: |
          mkdir -p Payload
          cp -r GarminPhoto.xcarchive/Products/Applications/App.app Payload/
          zip -r GarminPhoto.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Garmin-Photo-IPA
          path: GarminPhoto.ipa

