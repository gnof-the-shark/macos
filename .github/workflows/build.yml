name: "Build RemoteCam Native-Hybrid"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node & Capacitor
        run: |
          npm install
          npx cap add ios

- name: Compilation Xcode (Lien manuel vers Garmin)
        run: |
          cd ios/App
          # On définit le chemin vers le framework de manière absolue pour Xcode
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            FRAMEWORK_SEARCH_PATHS="$(inherited) '$(SRCROOT)/Frameworks'" \
            OTHER_LDFLAGS="$(inherited) -framework ConnectIQ"

            
      - name: Préparation du HTML vide
        run: |
          mkdir -p www
          echo "<!DOCTYPE html><html><body style='background:transparent;'></body></html>" > www/index.html
          npx cap sync ios

      - name: Injection du Code Swift Natif (AppDelegate)
        run: |
          cat <<'EOF' > ios/App/App/AppDelegate.swift
          import UIKit
          import Capacitor
          import AVFoundation
          import ConnectIQ

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              lazy var cameraManager = CameraManager()
              
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  cameraManager.setup()
                  let previewLayer = AVCaptureVideoPreviewLayer(session: cameraManager.session)
                  previewLayer.videoGravity = .resizeAspectFill
                  
                  DispatchQueue.main.async {
                      if let rootVC = self.window?.rootViewController {
                          previewLayer.frame = rootVC.view.bounds
                          rootVC.view.layer.insertSublayer(previewLayer, at: 0)
                          rootVC.view.backgroundColor = .clear
                          for subview in rootVC.view.subviews {
                              subview.backgroundColor = .clear
                              (subview as? UIView)?.isOpaque = false
                          }
                      }
                  }
                  return true
              }
          }

          extension UIImage {
              func resized(to size: CGSize) -> UIImage? {
                  UIGraphicsBeginImageContextWithOptions(size, false, 0.0)
                  draw(in: CGRect(origin: .zero, size: size))
                  let newImage = UIGraphicsGetImageFromCurrentImageContext()
                  UIGraphicsEndImageContext()
                  return newImage
              }
          }
          EOF

          echo -e "\n// --- CameraManager Logic ---" >> ios/App/App/AppDelegate.swift
          grep -v "import " CameraManager.swift >> ios/App/App/AppDelegate.swift

      - name: Configuration de Capacitor (Podfile sans Garmin)
        run: |
          cat <<'EOF' > ios/App/Podfile
          platform :ios, '13.0'
          target 'App' do
            use_frameworks!
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          cd ios/App && pod install --repo-update

      - name: Compilation Xcode (Lien manuel vers Garmin)
        run: |
          cd ios/App
          # On dit à Xcode d'inclure le dossier Frameworks qu'on a créé
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            FRAMEWORK_SEARCH_PATHS="$(inherited) $(PROJECT_DIR)/Frameworks" \
            OTHER_LDFLAGS="$(inherited) -framework ConnectIQ"

      - name: Création du fichier IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam_Final.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-IPA
          path: RemoteCam_Final.ipa
