name: "Deploy index.html"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload index.html
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: index.html
