name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare Files
        run: |
          # Création du dossier www s'il n'existe pas
          mkdir -p www
          # Copie de tes fichiers Sport-main (le point . signifie dossier courant)
          cp index.html styles.css app.js admin.js firebase-config.js www/ || true

      - name: Initialize iOS Project
        run: |
          # Si le dossier ios n'existe pas, on le crée proprement
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync & Patch Permissions
        run: |
          npx cap sync ios
          # Ajout de la permission Caméra dans le fichier Info.plist
          plutil -insert NSCameraUsageDescription -string "Accès nécessaire pour scanner les codes ou le profil." ios/App/App/Info.plist || true
          
      - name: Build Xcode Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
