name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Capacitor
        run: npm install

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html styles.css app.js admin.js firebase-config.js www/
          echo "Contenu du dossier www :"
          ls www

      - name: Setup iOS Project
        run: |
          # On s'assure de supprimer tout ancien dossier ios qui pourrait bloquer
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Build Xcode Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
