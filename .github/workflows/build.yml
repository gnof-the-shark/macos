name: "Build Capacitor iOS"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npx cap add ios

      - name: Build Web & Sync Capacitor
        run: |
          # Simule un build web (ou utilise ton propre script build)
          mkdir -p www
          echo "<html><body>Camera Bridge Ready</body></html>" > www/index.html
          npx cap copy ios
          npx cap sync ios

      - name: Compile iOS App (Unsigned)
        run: |
          cd ios/App
          xcodebuild build \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Create IPA for Sideloadly
        run: |
          mkdir -p Payload
          # Localiser le .app généré par Capacitor
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam_Capacitor.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-Capacitor-IPA
          path: RemoteCam_Capacitor.ipa
