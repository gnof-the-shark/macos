name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # On cherche les fichiers dans tout le dépôt et on les ramène dans www
          find . -name "index.html" -exec cp {} www/ \;
          find . -name "styles.css" -exec cp {} www/ \;
          find . -name "app.js" -exec cp {} www/ \;
          find . -name "admin.js" -exec cp {} www/ \;
          find . -name "firebase-config.js" -exec cp {} www/ \;
          
          # Vérification : si index.html n'est pas dans www, on force l'échec ici avec un message
          if [ ! -f "www/index.html" ]; then
            echo "ERREUR : Fichiers sources introuvables dans le dépôt !"
            exit 1
          fi

      - name: Setup iOS Project
        run: |
          # Supprime le dossier ios s'il existe pour éviter les conflits de liens corrompus
          rm -rf ios
          npx cap add ios
          npx cap sync ios

      - name: Set Permissions
        run: |
          plutil -insert NSCameraUsageDescription -string "Accès pour le défi sport." ios/App/App/Info.plist || true
          
      - name: Build Xcode Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
