name: "Build Native Swift App"

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Xcode Project Structure
        run: |
          # On crée un projet structuré pour Xcode
          mkdir -p RemoteCam/RemoteCam
          
          # On déplace tes fichiers Swift au bon endroit
          cp CameraManager.swift RemoteCam/RemoteCam/
          cp ContentView.swift RemoteCam/RemoteCam/
          
          # On crée le fichier de lancement (App)
          cat <<EOF > RemoteCam/RemoteCam/RemoteCamApp.swift
          import SwiftUI
          @main
          struct RemoteCamApp: App {
              @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }
          EOF

      - name: Install Pods (Garmin SDK)
        run: |
          # On crée le Podfile pour le projet natif
          cat <<EOF > RemoteCam/Podfile
          platform :ios, '14.0'
          target 'RemoteCam' do
            use_frameworks!
            pod 'ConnectIQ', :git => 'https://github.com/garmin/connectiq-companion-app-sdk-ios.git'
          end
          EOF
          cd RemoteCam && pod install --repo-update

      - name: Build Native App
        run: |
          cd RemoteCam
          # Note: Puisqu'on n'a pas de fichier .xcodeproj réel sur GitHub, 
          # il est préférable d'utiliser Capacitor pour générer la structure 
          # ou d'avoir le dossier 'ios' déjà présent sur ton dépôt.
