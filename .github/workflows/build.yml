name: "Build for Sideloadly"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build App Data
        run: |
          # On compile le projet en mode "Release" pour l'architecture iPhone
          # Remplace 'TonNomDeProjet' par le nom de ton fichier .xcodeproj
          xcodebuild build \
            -scheme "TonNomDeProjet" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Prepare IPA Folder
        run: |
          # On crée la structure d'un IPA (un dossier nommé Payload contenant le .app)
          mkdir -p Payload
          # On va chercher le .app compilé dans les dossiers de build par défaut de Xcode
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          # On compresse le tout en .zip mais on le nomme .ipa
          zip -r RemoteCam_Unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-Unsigned-IPA
          path: RemoteCam_Unsigned.ipa
