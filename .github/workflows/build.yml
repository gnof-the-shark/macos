name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare Files (Auto-Detection)
        run: |
          mkdir -p www
          # Cette commande cherche les fichiers n'importe où et les copie dans www
          find . -name "index.html" -exec cp {} www/ \;
          find . -name "styles.css" -exec cp {} www/ \;
          find . -name "app.js" -exec cp {} www/ \;
          find . -name "admin.js" -exec cp {} www/ \;
          find . -name "firebase-config.js" -exec cp {} www/ \;
          
          # Vérification pour le log (si c'est vide, le build s'arrêtera ici avec un message clair)
          ls -R www

      - name: Initialize iOS Project
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync & Patch
        run: |
          npx cap sync ios
          plutil -insert NSCameraUsageDescription -string "Accès nécessaire pour le défi sport." ios/App/App/Info.plist || true
          
      - name: Build Xcode Archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
