name: Build Sport App IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force l'utilisation de Node 24 pour éviter l'erreur de dépréciation
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Passage à la version 24

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Prepare Files
        run: |
          mkdir -p www
          # On copie tous les fichiers nécessaires de ton projet Sport-main
          cp index.html www/
          cp styles.css www/
          cp app.js www/
          cp admin.js www/
          cp firebase-config.js www/

      - name: Initialize Capacitor
        run: |
          npx cap add ios

      - name: Sync & Build
        run: |
          npx cap sync ios
          # Injection de la permission caméra pour iOS
          plutil -insert NSCameraUsageDescription -string "Accès nécessaire pour scanner ou pour le profil." ios/App/App/Info.plist
          
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath SportApp.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ENTITLEMENTS_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r SportApp.xcarchive/Products/Applications/App.app Payload/
          zip -r SportTracker.ipa Payload/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sport-App-IPA
          path: SportTracker.ipa
