name: "Build RemoteCam iOS (unsigned)"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Copie index.html dans www/
        run: npm run build

      - name: Initialisation iOS Capacitor
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Copie du Podfile personnalisé
        run: cp podfile ios/App/Podfile

      - name: Prépare les icônes
        run: mkdir -p assets && cp icon123.png assets/icon-only.png

      - name: Génération des icônes depuis icon.png
        run: npm run res

      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Compilation Xcode (non signé)
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath DerivedData

      - name: Création du fichier IPA (non signé)
        run: |
          mkdir -p Payload
          APP_PATH=ios/App/DerivedData/Build/Products/Release-iphoneos/App.app
          if [ ! -d "$APP_PATH" ]; then
            echo "Erreur : App.app introuvable"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r congelo.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: congelo
          path: congelo.ipa
