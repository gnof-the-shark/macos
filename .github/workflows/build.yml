name: "Build RemoteCam iOS (unsigned)"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Copie index.html dans www/
        run: npm run build

      - name: Génération des icônes depuis icon.png
        run: npm run res

      - name: Initialisation iOS Capacitor
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Pod install
        run: cd ios/App && pod install --repo-update

      - name: Compilation Xcode (non signé)
        run: |
          cd ios/App
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Création du fichier IPA (non signé)
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Erreur : App.app introuvable"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam_Unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RemoteCam-IPA
          path: RemoteCam_Unsigned.ipa
