- name: Build with Swift
        run: |
          # On compile directement les fichiers Swift en un exécutable iOS
          xcrun -sdk iphoneos swiftc *.swift \
            -o RemoteCamBinaire \
            -target arm64-apple-ios15.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -emit-executable

      - name: Prepare IPA for Sideloadly
        run: |
          mkdir -p Payload/RemoteCam.app
          # On déplace le binaire et les infos nécessaires
          mv RemoteCamBinaire Payload/RemoteCam.app/RemoteCam
          cp Info.plist Payload/RemoteCam.app/
          # Optionnel: Si tu as des icônes, il faudrait les compiler, 
          # mais pour Sideloadly, le binaire et l'Info.plist suffisent pour tester.
          
          zip -r RemoteCam_Unsigned.ipa Payload
