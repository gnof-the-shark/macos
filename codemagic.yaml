workflows:
  ios-build:
    name: RemoteCam iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies & Clean
        script: | 
          npm install
          rm -rf ios/App/Pods
          rm -rf ios/App/App.xcworkspace
          npx cap add ios
          npx cap update ios
      
      - name: Download Garmin SDK
        script: |
          git clone https://github.com/garmin/connectiq-companion-app-sdk-ios.git garmin-sdk
          mkdir -p ios/App/Frameworks
          cp -r garmin-sdk/ConnectIQ.xcframework ios/App/Frameworks/

      - name: Setup iOS Files (Plist & Camera)
        script: |
          # 1. Création du dossier de l'app
          mkdir -p ios/App/App
          
          # 2. Génération du Info.plist indispensable
          cat <<'EOF' > ios/App/App/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key><string>com.remotecam.app</string>
            <key>CFBundleName</key><string>RemoteCam</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>App</string>
            <key>NSCameraUsageDescription</key><string>Accès caméra requis pour le flux vidéo.</string>
            <key>NSBluetoothAlwaysUsageDescription</key><string>Lien Garmin requis pour la montre.</string>
          </dict></plist>
          EOF

          # 3. Copie du CameraManager.swift
          if [ -f CameraManager.swift ]; then
            cp CameraManager.swift ios/App/App/CameraManager.swift
          fi

          # 4. Injection de la logique de démarrage via extension
          cat <<'EOF' > ios/App/App/Injection.swift
          import UIKit
          import Capacitor
          import AVFoundation

          extension CAPBridgeViewController {
              override open func viewDidAppear(_ animated: Bool) {
                  super.viewDidAppear(animated)
                  
                  let camera = CameraManager()
                  camera.setup()
                  
                  let previewLayer = AVCaptureVideoPreviewLayer(session: camera.session)
                  previewLayer.videoGravity = .resizeAspectFill
                  previewLayer.frame = self.view.bounds
                  self.view.layer.insertSublayer(previewLayer, at: 0)
                  self.view.backgroundColor = .clear
              }
          }
          EOF

      - name: Configure Pods (Anti-Crash)
        script: |
          cat <<'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          use_frameworks!

          target 'App' do
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['SWIFT_COMPILATION_MODE'] = 'singlefile'
                config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-Onone'

                # CORRECTIF 1 : bon Info.plist pour CapacitorCordova
                if target.name == 'CapacitorCordova'
                  config.build_settings['INFOPLIST_FILE'] = '$(SRCROOT)/App/Info.plist'
                end

                # CORRECTIF 2 : isoler ConnectIQ — ne pas le linker dans les pods
                # On retire OTHER_LDFLAGS et FRAMEWORK_SEARCH_PATHS hérités du workspace
                # pour tous les targets SAUF 'App' (qui est dans App.xcodeproj, pas Pods)
                other_ldflags = config.build_settings['OTHER_LDFLAGS'] || '$(inherited)'
                if other_ldflags.is_a?(Array)
                  config.build_settings['OTHER_LDFLAGS'] = other_ldflags.reject { |f| f.include?('ConnectIQ') }
                elsif other_ldflags.is_a?(String)
                  config.build_settings['OTHER_LDFLAGS'] = other_ldflags.gsub('-framework ConnectIQ', '').strip
                end

                # Corriger le FRAMEWORK_SEARCH_PATHS : utiliser le bon chemin absolu
                config.build_settings['FRAMEWORK_SEARCH_PATHS'] = [
                  '$(inherited)',
                  '$(SRCROOT)/../App/Frameworks'
                ]
              end
            end
          end
          EOF

          # Créer aussi le dossier Pods/App avec un Info.plist de secours
          # au cas où Xcode le résolve avant le post_install
          mkdir -p ios/App/Pods/App
          cp ios/App/App/Info.plist ios/App/Pods/App/Info.plist

          cd ios/App && pod install --repo-update

      - name: Build iOS App (Final)
        script: |
          cd ios/App
          mkdir -p build_output
          
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build_output \
            -jobs 1 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ARCHS="arm64" \
            SWIFT_USE_INTEGRATED_DRIVER=NO \
            INFOPLIST_FILE="App/Info.plist" \
            FRAMEWORK_SEARCH_PATHS="$(inherited) $(PROJECT_DIR)/Frameworks" \
            OTHER_LDFLAGS="$(inherited) -framework ConnectIQ" \
            ONLY_ACTIVE_ARCH=YES

      - name: Package IPA
        script: |
          mkdir -p Payload
          APP_PATH=$(find ios/App/build_output -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam.ipa Payload

    artifacts:
      - "*.ipa"
