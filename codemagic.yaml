workflows:
  ios-build:
    name: RemoteCam iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies
        script: | 
          npm install
          npx cap add ios
          npx cap update ios
      
      - name: Download Garmin SDK
        script: |
          git clone https://github.com/garmin/connectiq-companion-app-sdk-ios.git garmin-sdk
          mkdir -p ios/App/Frameworks
          cp -r garmin-sdk/ConnectIQ.xcframework ios/App/Frameworks/

      - name: Inject Camera Logic (Separate File)
        script: |
          cat <<'EOF' > ios/App/App/CameraLogic.swift
          import UIKit
          import AVFoundation
          import ConnectIQ

          class CameraOverlay {
              static let shared = CameraOverlay()
              lazy var cameraManager = CameraManager()
              func show(on viewController: UIViewController) {
                  cameraManager.setup()
                  let previewLayer = AVCaptureVideoPreviewLayer(session: cameraManager.session)
                  previewLayer.videoGravity = .resizeAspectFill
                  previewLayer.frame = viewController.view.bounds
                  viewController.view.layer.insertSublayer(previewLayer, at: 0)
                  viewController.view.backgroundColor = .clear
              }
          }
          EOF
          echo "\n" >> ios/App/App/CameraLogic.swift
          if [ -f CameraManager.swift ]; then
            grep -v "import " CameraManager.swift >> ios/App/App/CameraLogic.swift
          fi
          cat <<'EOF' > ios/App/App/Injection.swift
          import UIKit
          import Capacitor
          extension CAPBridgeViewController {
              override open func viewDidAppear(_ animated: Bool) {
                  super.viewDidAppear(animated)
                  CameraOverlay.shared.show(on: self)
              }
          }
          EOF

      - name: Configure Pods
        script: |
          cat <<'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          target 'App' do
            use_frameworks!
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          cd ios/App && pod install --repo-update

- name: Build iOS App (Direct Output)
        script: |
          cd ios/App
          mkdir -p build_output
          
          # On compile en forçant les réglages de compatibilité sur TOUS les modules (Pods inclus)
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build_output \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            SWIFT_VERSION=5.0 \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            FRAMEWORK_SEARCH_PATHS="$(inherited) '$(PROJECT_DIR)/Frameworks'" \
            OTHER_LDFLAGS="$(inherited) -framework ConnectIQ" \
            | xcbeautify || true

      - name: Package IPA
        script: |
          rm -rf Payload RemoteCam.ipa
          mkdir -p Payload
          APP_PATH=$(find ios/App/build_output -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then exit 1; fi
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam.ipa Payload
    artifacts:
      - "*.ipa"
