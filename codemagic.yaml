workflows:
  ios-build:
    name: RemoteCam iOS Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies
        script: | 
          npm install
          npx cap add ios
          npx cap update ios
      
      - name: Download Garmin SDK
        script: |
          git clone https://github.com/garmin/connectiq-companion-app-sdk-ios.git garmin-sdk
          mkdir -p ios/App/Frameworks
          cp -r garmin-sdk/ConnectIQ.xcframework ios/App/Frameworks/

      - name: Create Info.plist & Inject Logic
        script: |
          # Création du Info.plist à la racine du projet iOS
          cat <<'EOF' > ios/App/App/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleIdentifier</key><string>com.remotecam.app</string>
            <key>CFBundleName</key><string>RemoteCam</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleVersion</key><string>1</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>App</string>
            <key>NSCameraUsageDescription</key><string>Accès caméra pour flux vidéo.</string>
            <key>NSBluetoothAlwaysUsageDescription</key><string>Lien montre Garmin.</string>
          </dict></plist>
          EOF

          # Injection de ton code caméra
          cat <<'EOF' > ios/App/App/CameraLogic.swift
          import UIKit
          import AVFoundation
          import ConnectIQ
          class CameraOverlay {
              static let shared = CameraOverlay()
              lazy var cameraManager = CameraManager()
              func show(on viewController: UIViewController) {
                  cameraManager.setup()
                  let previewLayer = AVCaptureVideoPreviewLayer(session: cameraManager.session)
                  previewLayer.videoGravity = .resizeAspectFill
                  previewLayer.frame = viewController.view.bounds
                  viewController.view.layer.insertSublayer(previewLayer, at: 0)
              }
          }
          EOF
          if [ -f CameraManager.swift ]; then
            echo "\n" >> ios/App/App/CameraLogic.swift
            grep -v "import " CameraManager.swift >> ios/App/App/CameraLogic.swift
          fi

      - name: Configure Pods
        script: |
          cat <<'EOF' > ios/App/Podfile
          platform :ios, '14.0'
          target 'App' do
            use_frameworks!
            pod 'Capacitor', :path => '../../node_modules/@capacitor/ios'
            pod 'CapacitorCordova', :path => '../../node_modules/@capacitor/ios'
          end
          EOF
          cd ios/App && pod install --repo-update

      - name: Build iOS App (Target Specific)
        script: |
          cd ios/App
          mkdir -p build_output
          
          # On définit le chemin du Plist uniquement pour la cible "App"
          xcodebuild build \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build_output \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            FRAMEWORK_SEARCH_PATHS="$(inherited) '$(PROJECT_DIR)/Frameworks'" \
            OTHER_LDFLAGS="$(inherited) -framework ConnectIQ" \
            INFOPLIST_FILE="App/Info.plist"

      - name: Package IPA
        script: |
          rm -rf Payload RemoteCam.ipa
          mkdir -p Payload
          APP_PATH=$(find ios/App/build_output -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r RemoteCam.ipa Payload
    artifacts:
      - "*.ipa"
