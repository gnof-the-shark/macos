name: GarminPhoto
options:
  bundleIdPrefix: com.gnoftheshark
  deploymentTarget:
    iOS: "15.0"

packages:
  ConnectIQ:
    url: https://github.com/garmin/connectiq-apple-sdk
    from: 1.0.0

targets:
  App:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - ".github/**"
          - ".git/**"
    info:
      path: Info.plist
      properties:
        UILaunchStoryboardName: ""
        NSCameraUsageDescription: "Nécessaire pour prendre des photos déclenchées par la montre Garmin"
        CFBundleDisplayName: "Garmin Photo"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - garminphoto
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gnoftheshark.garminphoto
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ConnectIQ
