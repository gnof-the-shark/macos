<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congélo - Gestion de Stock</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Manrope:wght@800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#006573',
                        'on-primary': '#ffffff',
                        surface: '#f0f9fa',
                        'surface-variant': '#dbeff1',
                        'on-surface': '#1a1c1e',
                        'on-surface-variant': '#40484c',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f0f9fa;
            color: #1a1c1e;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .frost-gradient {
            background: linear-gradient(135deg, #006573 0%, #50e1f9 100%);
        }
        .shimmer-gradient {
            background: linear-gradient(90deg, #006573, #008ba1, #006573);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Configuration & Constants ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzX1bQV2UuYHisMGdyO-nh96gQnFGRnm5U5fOtsBjs1aGeIxrUaV8N6CWsFd59AsuA/exec';
        
        const CATEGORIES = ['Viandes', 'Poissons', 'Légumes', 'Plats Préparés', 'Desserts', 'Autres'];
        const UNITS = ['unité', 'kg', 'g', 'L', 'ml', 'paquet', 'boîte'];

        // --- Icons Helper ---
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Services ---
        const fetchProductByBarcode = async (barcode) => {
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
                const data = await response.json();
                if (data.status === 1) {
                    const p = data.product;
                    return {
                        name: p.product_name || p.generic_name || 'Produit inconnu',
                        brand: p.brands || '',
                        imageUrl: p.image_url || p.image_front_url,
                        barcode: barcode
                    };
                }
                return null;
            } catch (error) {
                console.error('OFF Error:', error);
                return null;
            }
        };

        const saveToGoogleSheets = async (product) => {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(product),
                });
                return true;
            } catch (error) {
                console.error('Save Error:', error);
                return false;
            }
        };

        const fetchFromGoogleSheets = async () => {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-cache',
                    redirect: 'follow'
                });
                if (!response.ok) return [];
                const data = await response.json();
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Fetch Error:', error);
                throw error;
            }
        };

        // --- Components ---
        
        function NavButton({ active, onClick, iconName, label }) {
            return (
                <button 
                    onClick={onClick}
                    className={`flex flex-col items-center justify-center px-5 py-2 rounded-[1.25rem] transition-all duration-300 active:scale-90 ${
                        active ? 'bg-primary/10 text-primary' : 'text-on-surface-variant/60'
                    }`}
                >
                    <div className={`${active ? 'scale-110' : ''} transition-transform mb-1`}>
                        <Icon name={iconName} className="w-6 h-6" />
                    </div>
                    <span className="font-sans text-[10px] font-bold uppercase tracking-wider">{label}</span>
                </button>
            );
        }

        function StockCard({ item, onRemove }) {
            const isExpired = item.expiryDate && new Date(item.expiryDate) < new Date();
            return (
                <div className="glass-card rounded-xl p-6 shadow-sm relative overflow-hidden group hover:-translate-y-1 transition-all">
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex gap-4 items-center">
                            {item.imageUrl ? (
                                <img src={item.imageUrl} alt={item.name} className="w-12 h-12 rounded-xl object-cover" referrerPolicy="no-referrer" />
                            ) : (
                                <div className="w-12 h-12 rounded-xl frost-gradient flex items-center justify-center text-white">
                                    <Icon name="package" className="w-6 h-6" />
                                </div>
                            )}
                            <div>
                                <h3 className="text-lg font-bold font-headline text-on-surface">{item.name}</h3>
                                <div className="flex gap-2 items-center">
                                    <p className="text-on-surface-variant font-label text-[10px] uppercase tracking-wider">{item.category}</p>
                                    {item.brand && <span className="text-[10px] text-primary/60 font-bold">• {item.brand}</span>}
                                    {item.location && <span className="text-[10px] text-on-surface-variant/40 font-medium italic">({item.location})</span>}
                                </div>
                            </div>
                        </div>
                        <button onClick={onRemove} className="text-on-surface-variant/30 hover:text-red-500 transition-colors">
                            <Icon name="trash-2" className="w-5 h-5" />
                        </button>
                    </div>
                    <div className="flex justify-between items-end">
                        <p className="text-on-surface-variant font-label text-sm">Quantité: <span className="font-bold text-primary">{item.quantity} {item.unit}</span></p>
                        {item.expiryDate && (
                            <div className={`flex items-center gap-1 font-bold text-[10px] uppercase tracking-tighter ${isExpired ? 'text-red-500' : 'text-on-surface-variant'}`}>
                                <Icon name="alert-circle" className="w-3 h-3" />
                                <span>Expire le : {new Date(item.expiryDate).toLocaleDateString('fr-FR')}</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('stock');
            const [stock, setStock] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isLoading, setIsLoading] = useState(true);
            const [syncError, setSyncError] = useState(false);

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const sheetsData = await fetchFromGoogleSheets();
                    if (sheetsData && sheetsData.length > 0) {
                        setStock(sheetsData);
                        setSyncError(false);
                    } else {
                        const local = localStorage.getItem('congelo_stock');
                        if (local) setStock(JSON.parse(local));
                    }
                } catch (err) {
                    setSyncError(true);
                    const local = localStorage.getItem('congelo_stock');
                    if (local) setStock(JSON.parse(local));
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                loadData();
            }, []);

            useEffect(() => {
                localStorage.setItem('congelo_stock', JSON.stringify(stock));
            }, [stock]);

            const addProduct = async (product) => {
                const newProduct = { ...product, id: Date.now().toString(), addedAt: new Date().toISOString() };
                setStock(prev => [newProduct, ...prev]);
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#006573', '#50e1f9', '#ffffff']
                });
                setActiveTab('stock');
                await saveToGoogleSheets(newProduct);
            };

            const removeProduct = (id) => {
                setStock(prev => prev.filter(p => p.id !== id));
            };

            const filteredStock = stock.filter(p => 
                p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.category.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="min-h-screen bg-surface text-on-surface pb-32">
                    <header className="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-sm flex justify-between items-center px-6 py-4">
                        <div className="flex items-center gap-3">
                            <Icon name="snowflake" className="text-primary w-6 h-6" />
                            <h1 className="text-2xl font-black text-primary tracking-tighter font-headline">Congélo</h1>
                        </div>
                    </header>

                    <main className="pt-24 px-6 max-w-2xl mx-auto">
                        <AnimatePresence mode="wait">
                            {activeTab === 'stock' && (
                                <motion.div key="stock" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                                    <section className="mb-10">
                                        <div className="mb-8">
                                            <p className="text-on-surface-variant font-label text-sm uppercase tracking-widest mb-1">Inventaire Actuel</p>
                                            <div className="flex justify-between items-end">
                                                <h2 className="text-4xl font-black text-primary tracking-tight font-headline">Stock</h2>
                                                {syncError && (
                                                    <button onClick={loadData} className="flex items-center gap-1 text-red-500 text-[10px] font-bold uppercase hover:underline">
                                                        <Icon name="alert-circle" className="w-3 h-3" />
                                                        <span>Erreur de synchro (Réessayer)</span>
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        <div className="relative group mb-8">
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">
                                                <Icon name="search" className="w-5 h-5" />
                                            </div>
                                            <input 
                                                className="w-full bg-white/40 backdrop-blur-md border-none focus:ring-2 focus:ring-primary/20 rounded-xl py-4 pl-12 pr-4 text-on-surface font-headline font-medium shadow-sm transition-all"
                                                placeholder="Rechercher un ingrédient..."
                                                value={searchQuery}
                                                onChange={(e) => setSearchQuery(e.target.value)}
                                            />
                                        </div>

                                        <div className="grid gap-4">
                                            {filteredStock.length === 0 ? (
                                                <div className="text-center py-20 opacity-50">
                                                    <Icon name="package" className="w-12 h-12 mx-auto mb-4" />
                                                    <p>Votre congélateur est vide.</p>
                                                </div>
                                            ) : (
                                                filteredStock.map((item, idx) => (
                                                    <StockCard key={item.id || idx} item={item} onRemove={() => removeProduct(item.id)} />
                                                ))
                                            )}
                                        </div>
                                    </section>
                                </motion.div>
                            )}

                            {activeTab === 'grocery' && (
                                <motion.div key="grocery" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                                    <section className="mb-10">
                                        <div className="relative overflow-hidden rounded-xl h-48 mb-8 shadow-xl">
                                            <img src="https://picsum.photos/seed/grocery/800/400" alt="Grocery" className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                                            <div className="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent"></div>
                                            <div className="absolute bottom-6 left-6">
                                                <h2 className="text-3xl font-headline font-extrabold text-white tracking-tight">Liste de Courses</h2>
                                                <p className="text-white/90 font-label">Préparez vos prochains achats</p>
                                            </div>
                                        </div>
                                        <div className="glass-card p-8 rounded-xl text-center opacity-70">
                                            <Icon name="shopping-cart" className="w-12 h-12 mx-auto mb-4 text-primary" />
                                            <p className="font-headline font-bold">Bientôt disponible</p>
                                            <p className="text-sm">La synchronisation intelligente arrive bientôt.</p>
                                        </div>
                                    </section>
                                </motion.div>
                            )}

                            {activeTab === 'add' && (
                                <motion.div key="add" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }}>
                                    <AddProductView onAdd={addProduct} />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    <nav className="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-3 bg-white/60 backdrop-blur-md rounded-t-[1.5rem] z-50 shadow-lg">
                        <NavButton active={activeTab === 'stock'} onClick={() => setActiveTab('stock')} iconName="package" label="Stock" />
                        <NavButton active={activeTab === 'grocery'} onClick={() => setActiveTab('grocery')} iconName="shopping-cart" label="Épicerie" />
                        <NavButton active={activeTab === 'add'} onClick={() => setActiveTab('add')} iconName="plus-circle" label="Ajouter" />
                    </nav>
                </div>
            );
        }

        function AddProductView({ onAdd }) {
            const [step, setStep] = useState('choice');
            const [formData, setFormData] = useState({
                name: '', brand: '', location: 'Général', category: 'Autres',
                quantity: 1, unit: 'unité', expiryDate: '', imageUrl: '', isFavorite: false
            });
            const [photo, setPhoto] = useState(null);
            const videoRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (videoRef.current && videoRef.current.srcObject) {
                        const stream = videoRef.current.srcObject;
                        stream.getTracks().forEach(track => track.stop());
                    }
                };
            }, []);

            const handleScan = async (barcode) => {
                const productInfo = await fetchProductByBarcode(barcode);
                if (productInfo) {
                    setFormData(prev => ({ ...prev, ...productInfo }));
                    setStep('manual');
                } else {
                    alert("Produit non trouvé. Veuillez l'ajouter manuellement.");
                    setStep('manual');
                }
            };

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) { console.error("Camera error:", err); }
            };

            const takePhoto = () => {
                if (videoRef.current) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(videoRef.current, 0, 0);
                    const dataUrl = canvas.toDataURL('image/jpeg');
                    setPhoto(dataUrl);
                    setFormData(prev => ({ ...prev, imageUrl: dataUrl }));
                    const stream = videoRef.current.srcObject;
                    if (stream) stream.getTracks().forEach(track => track.stop());
                }
            };

            return (
                <div className="space-y-8">
                    <div className="relative mb-12">
                        <h2 className="font-headline font-extrabold text-4xl text-on-surface tracking-tight mb-2">Ajouter un produit</h2>
                        <p className="font-label text-on-surface-variant text-sm tracking-wide uppercase">Archivez vos nouvelles denrées</p>
                    </div>

                    {step === 'choice' && (
                        <div className="grid gap-6">
                            <button onClick={() => setStep('scan')} className="glass-card p-8 rounded-xl flex flex-col items-center gap-4 hover:bg-white/60 transition-all group">
                                <div className="w-16 h-16 rounded-full frost-gradient flex items-center justify-center text-white group-hover:scale-110 transition-transform">
                                    <Icon name="barcode" className="w-8 h-8" />
                                </div>
                                <div className="text-center">
                                    <h3 className="font-headline font-bold text-xl">Scanner un code-barres</h3>
                                    <p className="text-sm text-on-surface-variant">Utilisez l'API Open Food Facts</p>
                                </div>
                            </button>
                            <button onClick={() => setStep('manual')} className="glass-card p-8 rounded-xl flex flex-col items-center gap-4 hover:bg-white/60 transition-all group">
                                <div className="w-16 h-16 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                                    <Icon name="plus" className="w-8 h-8" />
                                </div>
                                <div className="text-center">
                                    <h3 className="font-headline font-bold text-xl">Ajout manuel</h3>
                                    <p className="text-sm text-on-surface-variant">Saisissez les détails vous-même</p>
                                </div>
                            </button>
                        </div>
                    )}

                    {step === 'scan' && (
                        <div className="glass-card rounded-xl p-6 overflow-hidden">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-headline font-bold">Scanner le produit</h3>
                                <button onClick={() => setStep('choice')}><Icon name="x" /></button>
                            </div>
                            <div id="reader" className="w-full rounded-xl overflow-hidden"></div>
                            <ScannerComponent onResult={handleScan} />
                        </div>
                    )}

                    {step === 'manual' && (
                        <div className="glass-card rounded-xl p-8 shadow-sm space-y-8">
                            <div className="flex justify-between items-center">
                                <h3 className="font-headline font-bold text-xl">Détails du produit</h3>
                                <button onClick={() => setStep('choice')}><Icon name="x" /></button>
                            </div>
                            <div className="space-y-6">
                                <div className="space-y-2">
                                    <label className="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant">Photo du produit</label>
                                    {photo ? (
                                        <div className="relative rounded-xl overflow-hidden aspect-video">
                                            <img src={photo} alt="Produit" className="w-full h-full object-cover" />
                                            <button onClick={() => { setPhoto(null); startCamera(); }} className="absolute top-2 right-2 bg-black/50 text-white p-2 rounded-full">
                                                <Icon name="trash-2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <div className="relative rounded-xl overflow-hidden aspect-video bg-black/5 flex items-center justify-center">
                                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                                <button onClick={takePhoto} className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-primary text-white p-4 rounded-full shadow-lg">
                                                    <Icon name="camera" />
                                                </button>
                                            </div>
                                            <button onClick={startCamera} className="text-xs text-primary font-bold uppercase tracking-widest flex items-center gap-2">
                                                <Icon name="camera" className="w-4 h-4" /> Activer la caméra
                                            </button>
                                        </div>
                                    )}
                                </div>
                                <input className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface focus:ring-2 focus:ring-primary/20 font-headline font-semibold" placeholder="Nom de l'article" value={formData.name} onChange={e => setFormData(p => ({ ...p, name: e.target.value }))} />
                                <div className="grid grid-cols-2 gap-4">
                                    <input className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" placeholder="Marque" value={formData.brand} onChange={e => setFormData(p => ({ ...p, brand: e.target.value }))} />
                                    <input className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" placeholder="Emplacement" value={formData.location} onChange={e => setFormData(p => ({ ...p, location: e.target.value }))} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <input type="number" className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" value={formData.quantity} onChange={e => setFormData(p => ({ ...p, quantity: Number(e.target.value) }))} />
                                    <select className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" value={formData.unit} onChange={e => setFormData(p => ({ ...p, unit: e.target.value }))}>
                                        {UNITS.map(u => <option key={u} value={u}>{u}</option>)}
                                    </select>
                                </div>
                                <select className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" value={formData.category} onChange={e => setFormData(p => ({ ...p, category: e.target.value }))}>
                                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <input type="date" className="w-full bg-surface-variant/40 border-none rounded-xl py-4 px-5 text-on-surface" value={formData.expiryDate} onChange={e => setFormData(p => ({ ...p, expiryDate: e.target.value }))} />
                                <button onClick={() => onAdd(formData)} disabled={!formData.name} className="w-full shimmer-gradient text-on-primary font-headline font-bold py-5 rounded-full shadow-lg flex items-center justify-center gap-3 disabled:opacity-50">
                                    <span>Enregistrer dans le stock</span>
                                    <Icon name="check-circle" />
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ScannerComponent({ onResult }) {
            useEffect(() => {
                const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
                scanner.render(onResult, () => {});
                return () => scanner.clear().catch(e => console.error(e));
            }, []);
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
